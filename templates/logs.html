<!DOCTYPE html>
<html>
<head>
    <title>Lightweight IDS Logs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #eaeaea;
        }

        .HIGH {
            color: red;
            font-weight: bold;
        }

        .MEDIUM {
            color: orange;
            font-weight: bold;
        }

        .LOW {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Lightweight IDS Logs / History</h1>

    <nav>
    <a href="/">Dashboard</a>
    <a href="/alerts">Alerts</a>
    <a href="/logs" style="font-weight:bold;">Logs</a>
</nav>

    <table>
        <tr>
            <th>ID</th>
            <th>Time</th>
            <th>Severity</th>
            <th>Type</th>
            <th>Source IP</th>
            <th>Status</th>
            <th>Description</th>
        </tr>

        {% for alert in alerts %}
        <tr>
            <td>{{ alert.id }}</td>
            <td>{{ alert.time }}</td>
            <td class="{{ alert.severity }}">{{ alert.severity }}</td>
            <td>{{ alert.type }}</td>
            <td>{{ alert.source_ip }}</td>
            <td>{{ alert.status }}</td>
            <td>{{ alert.description }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
